server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gRPC-Web (HTTP/1.1) requests → Envoy handles gRPC-Web to native gRPC conversion
    location /kw_agent_service {
        proxy_pass http://envoy:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Hashed bundle assets — safe to cache forever (Vite content-addresses them).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback. The HTML shell references hashed bundles, so it MUST be
    # revalidated on every navigation — otherwise a browser that cached an old
    # index.html keeps loading the previous deploy's (possibly now-missing)
    # bundles, and new code (e.g., the user-id setup modal) only surfaces after
    # a lucky cache miss on a subroute refresh.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
