server {
    listen 80;
    server_name _;

    resolver 1.1.1.1 8.8.8.8 ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # REST BFF routes used by the frontend in non-local deployments.
    # Without these, same-origin /api requests fall through to the SPA
    # fallback and return index.html instead of BFF responses.
    location /api/v1/agnes/ {
        proxy_pass https://api-agnes-dev.kiwiar.com;
        proxy_http_version 1.1;
        proxy_set_header Host api-agnes-dev.kiwiar.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location /api/v1/file/ {
        proxy_pass https://api-agnes-dev.kiwiar.com;
        proxy_http_version 1.1;
        proxy_set_header Host api-agnes-dev.kiwiar.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location /api/v1/user/ {
        proxy_pass https://api-agnes-dev.kiwiar.com;
        proxy_http_version 1.1;
        proxy_set_header Host api-agnes-dev.kiwiar.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy browser uploads through same-origin nginx to avoid bucket CORS
    # preflight failures when the frontend is served from a LAN IP/port.
    location = /__upload_proxy {
        if ($request_method != PUT) {
            return 405;
        }
        if ($http_x_upload_target = "") {
            return 400;
        }
        if ($http_x_upload_target !~* ^https://[A-Za-z0-9.-]+\.cos\.[A-Za-z0-9-]+\.myqcloud\.com/) {
            return 400;
        }

        client_max_body_size 100m;
        proxy_pass $http_x_upload_target;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Upload-Target "";
        proxy_ssl_server_name on;
    }

    # gRPC-Web (HTTP/1.1) requests → Envoy handles gRPC-Web to native gRPC conversion
    location /kw_agent_service {
        proxy_pass http://envoy:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Hashed bundle assets — safe to cache forever (Vite content-addresses them).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback. The HTML shell references hashed bundles, so it MUST be
    # revalidated on every navigation — otherwise a browser that cached an old
    # index.html keeps loading the previous deploy's (possibly now-missing)
    # bundles, and new code (e.g., the user-id setup modal) only surfaces after
    # a lucky cache miss on a subroute refresh.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
